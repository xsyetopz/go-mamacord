services:
  mamacord:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      SQLITE_PATH: /data/mamacord.sqlite
      MIGRATIONS_DIR: /app/migrations/sqlite
      LOCALES_DIR: /app/locales
      PLUGINS_DIR: /app/plugins
      MAMACORD_PERMISSIONS_FILE: /app/config/permissions.json
    volumes:
      - ./data:/data
      - ./plugins:/app/plugins
      - ./config:/app/config:ro
